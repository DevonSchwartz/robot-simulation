name: WASM Build And Docs Sync

on:
  push:
    branches: [main]
    paths:
      - "main.py"
      - "requirements.txt"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "main.py"
      - "requirements.txt"
      - ".github/workflows/ci.yml"

permissions:
  contents: write

jobs:
  wasm-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pygbag

      - name: Build WASM with pygbag
        run: python -m pygbag --build main.py

      - name: Copy build output to docs
        run: |
          rm -rf docs
          mkdir -p docs
          cp -r build/web/. docs/

      - name: Upload docs site artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: docs/

      - name: Commit updated docs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update wasm docs build"
          file_pattern: docs/**
