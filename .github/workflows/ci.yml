name: WASM Build And Deploy

on:
  push:
    branches: [main]
    paths:
      - "main.py"
      - "requirements.txt"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "main.py"
      - "requirements.txt"
      - ".github/workflows/ci.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  wasm-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pygbag

      - name: Build WASM with pygbag
        run: python -m pygbag --build main.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Copy build output to docs
        run: |
          rm -rf docs
          mkdir -p docs
          cp -r build/web/. docs/
          touch docs/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: wasm-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
